name: Infra Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "infra/**"
      - "mise.toml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/infra-checks.yml"
  push:
    branches:
      - master
    paths:
      - "infra/**"
      - "mise.toml"
      - ".pre-commit-config.yaml"
      - ".github/workflows/infra-checks.yml"

permissions:
  contents: read

jobs:
  ansible:
    name: Ansible
    runs-on: [self-hosted, Linux, X64, eve, ci, python]
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/infra/ansible/ansible.cfg
      ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/infra/ansible/collections

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain with mise
        uses: jdx/mise-action@v4

      - name: Install Ansible collections
        working-directory: infra/ansible
        run: ansible-galaxy collection install -r requirements.yml --collections-path "$ANSIBLE_COLLECTIONS_PATH"

      - name: Show Ansible collection diagnostics
        run: |
          set -euo pipefail
          ansible --version
          ansible-config dump --only-changed
          ansible-galaxy collection list
          test -d "$GITHUB_WORKSPACE/infra/ansible/collections/ansible_collections/community/general"
          printf '%s\n' 'present: infra/ansible/collections/ansible_collections/community/general'

      - name: Run Ansible checks
        working-directory: infra
        run: make ansible-lint

  terraform:
    name: Terraform
    runs-on: [self-hosted, Linux, X64, eve, ci, python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain with mise
        uses: jdx/mise-action@v4

      - name: Run OpenTofu checks
        working-directory: infra
        run: make tf-lint

  k8s-helm:
    name: Kubernetes and Helm
    runs-on: [self-hosted, Linux, X64, eve, ci, python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install toolchain with mise
        uses: jdx/mise-action@v4

      - name: Lint Kubernetes manifest YAML
        working-directory: infra
        run: make yaml-lint-k8s

      - name: Lint Helm values against charts
        working-directory: infra
        run: make helm-lint

      - name: Render Helm charts
        working-directory: infra
        run: make helm-render

      - name: Verify monitoring chart wiring
        working-directory: infra
        run: make validate-monitoring
