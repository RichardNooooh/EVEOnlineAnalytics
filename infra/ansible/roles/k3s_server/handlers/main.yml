# =============================================================================
# k3s Server Role Handlers
# =============================================================================

---
- name: Restart k3s
  ansible.builtin.systemd:
    name: "{{ k3s_service_name }}"
    state: restarted
    daemon_reload: true

- name: Reload k3s
  ansible.builtin.systemd:
    name: "{{ k3s_service_name }}"
    state: reloaded
