#!/usr/bin/env ansible-playbook
# =============================================================================
# k3s-init.yml — Bootstrap 3-Node HA k3s Cluster (Embedded etcd)
# =============================================================================
# Bootstraps a highly-available k3s cluster using the k3s_server role.
#
# Prerequisites:
#   - VMs are running and accessible via SSH
#   - Inventory has k3s_servers, k3s_first_node, and k3s_other_nodes groups
#   - Inventory file generated by Terraform at inventory/hosts.ini
#
# Usage:
#   ansible-playbook playbooks/k3s-init.yml
#   ansible-playbook site.yml --tags k3s        # Via site playbook
#
# Variables: See group_vars/k3s_servers.yml
# =============================================================================

---
- name: Bootstrap k3s HA cluster
  hosts: k3s_servers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display playbook start message
      ansible.builtin.debug:
        msg: |
          Starting k3s cluster bootstrap
          Target version: {{ k3s_version }}
          TLS SAN: {{ k3s_tls_san }}
      tags:
        - always

  roles:
    - role: k3s_server
      tags:
        - k3s
        - install
        - bootstrap

  post_tasks:
    - name: Display completion summary
      ansible.builtin.debug:
        msg: |
          k3s cluster bootstrap complete!

          Cluster Nodes:
          {% for host in groups['k3s_servers'] %}
          - {{ host }}: {{ hostvars[host]['ansible_host'] | default('unknown') }}
          {% endfor %}

          Next steps:
          1. Verify cluster: kubectl get nodes
          2. Configure NFS: ansible-playbook playbooks/nfs-client.yml
          3. Deploy workloads via Helm
      run_once: true
      delegate_to: localhost
      become: false
      tags:
        - summary
        - always
