# =============================================================================
# k3s Server Role — Default Variables
# =============================================================================
# Role-internal variables only. Site configuration lives in
# inventory/group_vars/k3s_servers.yml, with sensitive etcd S3 backup fields in
# inventory/vault/.
# =============================================================================

---
# Installer
k3s_installer_url: "https://get.k3s.io"
k3s_binary_base_url: "https://github.com/k3s-io/k3s/releases/download"
k3s_installer_script: "{{ k3s_installer_cache }}/install.sh"

# First node detection (auto-determined from inventory)
k3s_is_first_node: "{{ inventory_hostname in groups['k3s_first_node'] | default([]) }}"

# Token file path on the node (server side)
k3s_token_node: "{{ k3s_data_dir }}/server/token"

# Wait timeouts
k3s_wait_retries: 15
k3s_wait_delay: 10

# API server wait
k3s_api_wait_retries: 30
k3s_api_wait_delay: 5
