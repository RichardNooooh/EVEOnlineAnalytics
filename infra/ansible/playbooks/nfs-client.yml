#!/usr/bin/env ansible-playbook
# =============================================================================
# nfs-client.yml — Configure TrueNAS NFS Client on k3s Nodes
# =============================================================================
# Configures NFS client using the nfs_client role.
#
# Prerequisites:
#   - VMs are running and accessible via SSH
#   - TrueNAS NFS server accessible
#
# Usage:
#   ansible-playbook playbooks/nfs-client.yml
#
# Variables: See group_vars/all.yml
# =============================================================================

---
- name: Configure TrueNAS NFS client
  hosts: k3s_servers
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display NFS configuration plan
      ansible.builtin.debug:
        msg: |
          Configuring NFS client on k3s nodes
          Server: {{ nfs_server }}:{{ nfs_remote_path }}
          Local mount: {{ nfs_local_mount }}
          Options: {{ nfs_mount_options }}
      tags:
        - always

  roles:
    - role: nfs_client
      tags:
        - nfs
        - storage
        - bootstrap

  post_tasks:
    - name: Display NFS summary
      ansible.builtin.debug:
        msg: |
          NFS configuration complete!

          Mount points:
          {% for host in groups['k3s_servers'] %}
          - {{ host }}: {{ nfs_local_mount }}
          {% endfor %}

          Used by: Kubernetes PersistentVolumes in infra/k8s/nfs-pv.yaml
      run_once: true
      delegate_to: localhost
      become: false
      tags:
        - summary
        - always
