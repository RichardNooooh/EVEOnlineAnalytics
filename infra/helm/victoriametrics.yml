# ---------------------------------------------------------------------------
# Server configuration
# ---------------------------------------------------------------------------
server:
  # Retain metrics for 30 days on local monitoring storage.
  retentionPeriod: "30d"

  # Use local-path-provisioner (k3s default) for metrics storage.
  # VictoriaMetrics benefits from local disk I/O over NFS.
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClassName: local-path

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 700m
      memory: 1024Mi

  ingress:
    # Keep ingress enabled for homelab/admin UI exploration and debugging.
    # TLS is terminated at the homelab reverse proxy, so no TLS block is set here.
    enabled: true
    ingressClassName: traefik
    hosts:
      - name: "eve-vm.lab.answerisnoh.dev"
        path: /
        port: http

  scrape:
    enabled: true
