spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: "10.218.20.30"
    path: "/mnt/tank/eve-market/airflow-logs"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eve-airflow-logs-pvc
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: eve-market
