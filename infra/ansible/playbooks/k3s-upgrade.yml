#!/usr/bin/env ansible-playbook
# =============================================================================
# k3s-upgrade.yml — Rolling Upgrade of k3s Cluster
# =============================================================================
# Performs rolling upgrade using the k3s_upgrade role.
# Includes etcd snapshot before upgrade.
#
# Prerequisites:
#   - k3s cluster is running and healthy
#   - kubectl access from first node
#   - Target version specified in k3s_version variable
#
# Usage:
#   ansible-playbook playbooks/k3s-upgrade.yml
#   ansible-playbook playbooks/k3s-upgrade.yml -e "k3s_version=v1.35.3+k3s1"
#
# Variables: See group_vars/all.yml
# =============================================================================

---
- name: Rolling upgrade of k3s cluster
  hosts: k3s_servers
  become: true
  serial: 1  # One node at a time for safety
  gather_facts: true

  pre_tasks:
    - name: Display upgrade plan
      ansible.builtin.debug:
        msg: |
          Starting k3s rolling upgrade
          Target version: {{ k3s_version }}
          Force drain (DANGEROUS): {{ k3s_upgrade_force_drain }}
          etcd snapshot: Enabled (first node only)
      run_once: true
      tags:
        - always

  roles:
    - role: k3s_upgrade
      tags:
        - k3s
        - upgrade

  post_tasks:
    - name: Final verification
      ansible.builtin.debug:
        msg: |
          Rolling upgrade complete!
          All nodes should now be at version {{ k3s_version }}
          
          Verify with: kubectl get nodes -o wide
      run_once: true
      delegate_to: localhost
      become: false
      tags:
        - summary
        - always
