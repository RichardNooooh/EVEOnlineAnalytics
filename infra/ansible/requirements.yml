# =============================================================================
# Ansible Collections Requirements
# =============================================================================
# Collections required by this project. Install with:
#   ansible-galaxy collection install -r requirements.yml
# =============================================================================
collections:
  # POSIX platform support (acl, firewalld, mount, selinux, etc.)
  - name: ansible.posix
    version: ">=1.5.0"
    source: https://galaxy.ansible.com
  # General community modules (filesystem, packaging, etc.)
  - name: community.general
    version: ">=8.0.0"
    source: https://galaxy.ansible.com
  # Kubernetes management (k8s, kubectl, helm)
  - name: kubernetes.core
    version: ">=3.0.0"
    source: https://galaxy.ansible.com
  # Docker/podman container management (for local dev)
  - name: community.docker
    version: ">=3.0.0"
    source: https://galaxy.ansible.com
