# =============================================================================
# Site Playbook — Complete k3s Cluster Bootstrap
# =============================================================================
# Main entrypoint for bootstrapping and managing the k3s cluster.
# Imports specialized playbooks in the correct order.
#
# Usage:
#   ansible-playbook site.yml                    # Run full site
#   ansible-playbook site.yml --tags preflight   # Run only preflight checks
#   ansible-playbook site.yml --skip-tags smoke  # Skip smoke tests
# =============================================================================

---
# Phase 1: Preflight Checks
# Read-only validation of prerequisites, connectivity, and versions.
- name: Import preflight playbook
  import_playbook: playbooks/preflight.yml
  tags:
    - preflight
    - always

# Phase 2: Common Node Configuration
# Base OS setup: time sync, swap, sysctl, packages.
- name: Import common playbook
  import_playbook: playbooks/common.yml
  tags:
    - common
    - bootstrap

# Phase 3: k3s Cluster Bootstrap
# Install and configure k3s with embedded etcd HA.
- name: Import k3s-init playbook
  import_playbook: playbooks/k3s-init.yml
  tags:
    - k3s
    - install
    - bootstrap

# Phase 4: NFS Client Configuration
# Mount TrueNAS shared storage for PersistentVolumes.
- name: Import nfs-client playbook
  import_playbook: playbooks/nfs-client.yml
  tags:
    - nfs
    - storage
    - bootstrap

# Phase 5: Post-Deployment Verification
# Verify cluster health and display summary.
- name: Import verify playbook
  import_playbook: playbooks/verify.yml
  tags:
    - verify
    - smoke
    - always
