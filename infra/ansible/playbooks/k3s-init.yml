#!/usr/bin/env ansible-playbook
# =============================================================================
# k3s-init.yml — Bootstrap 3-Node HA k3s Cluster (Embedded etcd)
# =============================================================================
# Bootstraps a highly-available k3s cluster with 3 server nodes using
# embedded etcd. First node initializes the cluster; other nodes join.
#
# Prerequisites:
#   - VMs are running and accessible via SSH
#   - Inventory has k3s_servers, k3s_first_node, and k3s_other_nodes groups
#   - Inventory file generated by Terraform at inventory/hosts.ini
#
# Usage:
#   ansible-playbook -i inventory/hosts.ini playbooks/k3s-init.yml
#
# Variables:
#   k3s_version: k3s release to install (default: v1.35.3+k3s1)
#   k3s_token_file: Path to save cluster join token locally
#   k3s_kubeconfig_local: Boolean to copy kubeconfig to local ~/.kube/config
#   k3s_kubeconfig_path: Local path for kubeconfig copy (if enabled)
# =============================================================================

---
- name: Bootstrap k3s HA cluster
  hosts: k3s_servers
  become: true
  vars:
    k3s_version: "v1.35.3+k3s1"
    k3s_installer_url: "https://get.k3s.io"
    k3s_binary_url: "https://github.com/k3s-io/k3s/releases/download/{{ k3s_version }}/k3s"
    k3s_token_file: "{{ inventory_dir }}/k3s-token.txt"
    k3s_kubeconfig_local: true
    k3s_kubeconfig_path: "~/.kube/config"
    k3s_server_flags: "--write-kubeconfig-mode 644 --tls-san eve-market.lab.answerisnoh.dev"

  tasks:
    # -------------------------------------------------------------------------
    # Pre-flight Checks
    # -------------------------------------------------------------------------
    - name: Check if k3s is already installed
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Get current k3s version
      ansible.builtin.command: /usr/local/bin/k3s --version
      register: current_k3s_version
      changed_when: false
      failed_when: false
      when: k3s_binary.stat.exists

    - name: Display current k3s version
      ansible.builtin.debug:
        msg: "Node {{ inventory_hostname }} has k3s version: {{ current_k3s_version.stdout | default('Not installed') }}"
      when: k3s_binary.stat.exists

    # -------------------------------------------------------------------------
    # Install k3s on First Node (Cluster Init)
    # -------------------------------------------------------------------------
    - name: Install k3s on first node with cluster-init
      ansible.builtin.shell: |
        curl -sfL {{ k3s_installer_url }} | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          INSTALL_K3S_EXEC="server {{ k3s_server_flags }} --cluster-init" \
          sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install_first
      retries: 3
      delay: 10
      until: k3s_install_first.rc == 0
      when: inventory_hostname in groups['k3s_first_node']

    - name: Wait for k3s service on first node
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true
      register: k3s_service_first
      until: k3s_service_first.status.ActiveState == "active"
      retries: 10
      delay: 5
      when: inventory_hostname in groups['k3s_first_node']

    - name: Retrieve cluster join token from first node
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/token
      register: k3s_token_b64
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"
      when: inventory_hostname in groups['k3s_first_node']

    - name: Set cluster token fact for all nodes
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ k3s_token_b64.content | b64decode | trim }}"
      when: inventory_hostname in groups['k3s_first_node']

    - name: Save cluster token locally
      ansible.builtin.copy:
        content: "{{ hostvars[groups['k3s_first_node'][0]]['k3s_cluster_token'] }}"
        dest: "{{ k3s_token_file }}"
        mode: '0600'
      delegate_to: localhost
      run_once: true
      become: false
      when: inventory_hostname in groups['k3s_first_node']

    # -------------------------------------------------------------------------
    # Install k3s on Other Nodes (Join Cluster)
    # -------------------------------------------------------------------------
    - name: Read cluster token locally
      ansible.builtin.slurp:
        src: "{{ k3s_token_file }}"
      register: k3s_token_local_b64
      delegate_to: localhost
      run_once: true
      become: false
      when: inventory_hostname in groups['k3s_other_nodes']

    - name: Set cluster token fact for joining nodes
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ hostvars[groups['k3s_first_node'][0]]['k3s_cluster_token'] | default(k3s_token_local_b64.content | b64decode | trim) }}"
      when: inventory_hostname in groups['k3s_other_nodes']

    - name: Get first node IP for cluster join
      ansible.builtin.set_fact:
        k3s_first_node_ip: "{{ hostvars[groups['k3s_first_node'][0]]['ansible_host'] }}"
      when: inventory_hostname in groups['k3s_other_nodes']

    - name: Install k3s on remaining nodes (join cluster)
      ansible.builtin.shell: |
        curl -sfL {{ k3s_installer_url }} | \
          INSTALL_K3S_VERSION={{ k3s_version }} \
          K3S_URL=https://{{ k3s_first_node_ip }}:6443 \
          K3S_TOKEN={{ k3s_cluster_token }} \
          INSTALL_K3S_EXEC="server {{ k3s_server_flags }}" \
          sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install_join
      retries: 3
      delay: 10
      until: k3s_install_join.rc == 0
      when: inventory_hostname in groups['k3s_other_nodes']

    - name: Wait for k3s service on joining nodes
      ansible.builtin.systemd:
        name: k3s
        state: started
        enabled: true
      register: k3s_service_join
      until: k3s_service_join.status.ActiveState == "active"
      retries: 10
      delay: 5
      when: inventory_hostname in groups['k3s_other_nodes']

    # -------------------------------------------------------------------------
    # Verify Cluster Health
    # -------------------------------------------------------------------------
    - name: Wait for all nodes to be ready
      ansible.builtin.command: |
        /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes
      register: kubectl_nodes
      changed_when: false
      retries: 15
      delay: 10
      until: kubectl_nodes.rc == 0
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"

    - name: Display cluster nodes
      ansible.builtin.debug:
        msg: "{{ kubectl_nodes.stdout }}"
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"

    - name: Verify all nodes are Ready
      ansible.builtin.command: |
        /usr/local/bin/kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}'
      register: node_status
      changed_when: false
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"

    - name: Display node status
      ansible.builtin.debug:
        var: node_status.stdout_lines
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"

    # -------------------------------------------------------------------------
    # Download kubeconfig locally (optional)
    # -------------------------------------------------------------------------
    - name: Fetch kubeconfig from first node
      ansible.builtin.slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconfig_b64
      run_once: true
      delegate_to: "{{ groups['k3s_first_node'][0] }}"
      when: k3s_kubeconfig_local | bool

    - name: Ensure local .kube directory exists
      ansible.builtin.file:
        path: "{{ k3s_kubeconfig_path | dirname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false
      when: k3s_kubeconfig_local | bool

    - name: Save kubeconfig locally
      ansible.builtin.copy:
        content: "{{ kubeconfig_b64.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://eve-market.lab.answerisnoh.dev:6443') }}"
        dest: "{{ k3s_kubeconfig_path }}"
        mode: '0600'
        backup: true
      delegate_to: localhost
      run_once: true
      become: false
      when: k3s_kubeconfig_local | bool

    - name: Display kubeconfig saved message
      ansible.builtin.debug:
        msg: "kubeconfig saved to {{ k3s_kubeconfig_path }}"
      run_once: true
      delegate_to: localhost
      become: false
      when: k3s_kubeconfig_local | bool

  handlers:
    - name: Restart k3s
      ansible.builtin.systemd:
        name: k3s
        state: restarted
