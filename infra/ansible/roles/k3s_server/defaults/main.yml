# =============================================================================
# k3s Server Role — Default Variables
# =============================================================================
# Variables for k3s server installation and configuration.
# Many values are inherited from group_vars.
# =============================================================================

---
# Installer settings
k3s_installer_url: "https://get.k3s.io"
k3s_binary_base_url: "https://github.com/k3s-io/k3s/releases/download"

# Installer script cache
k3s_installer_script: "{{ k3s_installer_cache }}/install.sh"

# k3s service name
k3s_service_name: "k3s"

# First node detection (auto-determined)
k3s_is_first_node: "{{ inventory_hostname in groups['k3s_first_node'] | default([]) }}"

# Kubeconfig on node
k3s_kubeconfig_node: "/etc/rancher/k3s/k3s.yaml"

# Token file on node
k3s_token_node: "{{ k3s_data_dir }}/server/token"

# Wait timeouts
k3s_wait_retries: 15
k3s_wait_delay: 10

# API server wait
k3s_api_wait_retries: 30
k3s_api_wait_delay: 5
