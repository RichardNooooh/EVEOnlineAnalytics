# =============================================================================
# k3s Server Role Tasks
# =============================================================================
# Installs k3s on server nodes using config file approach.
# Handles both first-node (cluster-init) and other-nodes (join) logic.
# =============================================================================

---
# -----------------------------------------------------------------------------
# Pre-flight Checks
# -----------------------------------------------------------------------------
- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: "{{ k3s_binary_path }}"
  register: k3s_binary_stat
  tags:
    - k3s
    - preflight

- name: Get current k3s version
  ansible.builtin.shell: |
    set -o pipefail
    {{ k3s_binary_path }} --version 2>/dev/null | grep 'k3s version' | awk '{print $3}' || echo 'none'
  register: k3s_current_version
  changed_when: false
  when: k3s_binary_stat.stat.exists
  tags:
    - k3s
    - preflight

- name: Display current k3s version
  ansible.builtin.debug:
    msg: "Current k3s version on {{ inventory_hostname }}: {{ k3s_current_version.stdout | default('not installed') }}"
  tags:
    - k3s
    - preflight

- name: Determine if installation/upgrade needed
  ansible.builtin.set_fact:
    k3s_needs_install: >
      {{ not k3s_binary_stat.stat.exists or
         (k3s_current_version.stdout | default('')) != k3s_version }}
  tags:
    - k3s
    - preflight

- name: Check etcd S3 vault file
  ansible.builtin.stat:
    path: "{{ etcd_snapshot_s3_vault_file }}"
  register: etcd_snapshot_s3_vault_stat
  when: etcd_snapshot_s3_enabled | bool
  run_once: true
  delegate_to: localhost
  become: false
  tags:
    - k3s
    - config

- name: Fail if etcd S3 vault file is missing
  ansible.builtin.assert:
    that:
      - etcd_snapshot_s3_vault_stat.stat.exists
      - etcd_snapshot_s3_vault_stat.stat.isreg
    fail_msg: |
      etcd_snapshot_s3_enabled=true requires vaulted vars file:
        {{ etcd_snapshot_s3_vault_file }}

      Create it with ansible-vault and define:
        - etcd_snapshot_s3_secret_name
        - etcd_snapshot_s3_endpoint
        - etcd_snapshot_s3_bucket
        - etcd_snapshot_s3_region
        - etcd_snapshot_s3_folder
        - etcd_snapshot_s3_access_key
        - etcd_snapshot_s3_secret_key
  when: etcd_snapshot_s3_enabled | bool
  run_once: true
  delegate_to: localhost
  become: false
  tags:
    - k3s
    - config

- name: Load etcd S3 vaulted variables
  ansible.builtin.include_vars:
    file: "{{ etcd_snapshot_s3_vault_file }}"
  when: etcd_snapshot_s3_enabled | bool
  no_log: true
  tags:
    - k3s
    - config

- name: Validate etcd S3 snapshot configuration
  ansible.builtin.assert:
    that:
      - etcd_snapshot_s3_secret_name | default('') | trim | length > 0
      - etcd_snapshot_s3_endpoint | default('') | trim | length > 0
      - etcd_snapshot_s3_bucket | default('') | trim | length > 0
      - etcd_snapshot_s3_region | default('') | trim | length > 0
      - etcd_snapshot_s3_folder | default('') | trim | length > 0
      - etcd_snapshot_s3_access_key | default('') | trim | length > 0
      - etcd_snapshot_s3_secret_key | default('') | trim | length > 0
      - not (
          (etcd_snapshot_s3_endpoint_ca | default('') | trim | length > 0) and
          (etcd_snapshot_s3_endpoint_ca_name | default('') | trim | length > 0)
        )
    fail_msg: |
      etcd_snapshot_s3_enabled=true requires these variables:
        - etcd_snapshot_s3_secret_name
        - etcd_snapshot_s3_endpoint
        - etcd_snapshot_s3_bucket
        - etcd_snapshot_s3_region
        - etcd_snapshot_s3_folder
        - etcd_snapshot_s3_access_key
        - etcd_snapshot_s3_secret_key

      Load sensitive values from vault file:
        {{ etcd_snapshot_s3_vault_file }}

      Set only one of:
        - etcd_snapshot_s3_endpoint_ca
        - etcd_snapshot_s3_endpoint_ca_name
  when: etcd_snapshot_s3_enabled | bool
  run_once: true
  delegate_to: localhost
  become: false
  tags:
    - k3s
    - config

# -----------------------------------------------------------------------------
# Ensure Directories
# -----------------------------------------------------------------------------
- name: Create k3s directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ k3s_config_dir }}"
    - "{{ k3s_manifest_dir }}"
    - "{{ k3s_installer_cache }}"
  tags:
    - k3s
    - config

# -----------------------------------------------------------------------------
# Install k3s Config File
# -----------------------------------------------------------------------------
- name: Load in generated k3s cluster key from localhost
  ansible.builtin.slurp:
    src: "{{ k3s_token_file }}"
  register: k3s_cluster_token
  delegate_to: localhost
  become: false

- name: Render k3s configuration file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ k3s_config_file }}"
    mode: '0600'
  tags:
    - k3s
    - config

- name: Render etcd S3 snapshot secret manifest
  ansible.builtin.template:
    src: etcd-s3-config.yaml.j2
    dest: "{{ k3s_manifest_dir }}/etcd-s3-config-secret.yaml"
    mode: '0600'
  when:
    - k3s_is_first_node | bool
    - etcd_snapshot_s3_enabled | bool
  no_log: true
  tags:
    - k3s
    - config

- name: Remove etcd S3 snapshot secret manifest when disabled
  ansible.builtin.file:
    path: "{{ k3s_manifest_dir }}/etcd-s3-config-secret.yaml"
    state: absent
  when:
    - k3s_is_first_node | bool
    - not (etcd_snapshot_s3_enabled | bool)
  tags:
    - k3s
    - config

- name: Download k3s installer script
  ansible.builtin.get_url:
    url: "{{ k3s_installer_url }}"
    dest: "{{ k3s_installer_script }}"
    mode: '0755'
    timeout: 120

# -----------------------------------------------------------------------------
# First Node: Initialize Cluster
# -----------------------------------------------------------------------------
- name: Initialize k3s cluster on first node
  when:
    - k3s_is_first_node | bool
    - k3s_needs_install | bool
  tags:
    - k3s
    - install
    - first
  block:
    - name: Render kube_vip config on first node
      ansible.builtin.template:
        src: kube-vip.yaml.j2
        dest: "{{ k3s_manifest_dir }}/kube-vip.yaml"
        mode: '0600'

    - name: Install k3s on first node
      ansible.builtin.shell: |
        INSTALL_K3S_EXEC="server" \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        {{ k3s_installer_script }}

    - name: Wait for k3s service
      ansible.builtin.systemd:
        name: "{{ k3s_service_name }}"
        state: started
        enabled: true
      register: k3s_service_first
      until: (k3s_service_first.status | default({})).ActiveState | default('') == "active"
      retries: "{{ k3s_wait_retries }}"
      delay: "{{ k3s_wait_delay }}"

    - name: Wait for API server to be ready on localhost
      # k3s disables anonymous-auth by default, so /readyz returns 401
      # when healthy. 401 confirms the API server and auth stack are up.
      ansible.builtin.uri:
        url: "https://127.0.0.1:6443/readyz"
        validate_certs: false
        status_code: [200, 401]
      register: api_ready
      until: api_ready.status | default(-1) in [200, 401]
      retries: "{{ k3s_api_wait_retries }}"
      delay: "{{ k3s_api_wait_delay }}"

    - name: Wait for API server to be ready on kube-vip VIP
      # k3s disables anonymous-auth by default, so /readyz returns 401
      # when healthy. 401 confirms the API server and auth stack are up.
      ansible.builtin.uri:
        url: "https://{{ k3s_vip_address }}:6443/readyz"
        validate_certs: false
        status_code: [200, 401]
      register: api_ready
      until: api_ready.status | default(-1) in [200, 401]
      retries: "{{ k3s_api_wait_retries }}"
      delay: "{{ k3s_api_wait_delay }}"

# -----------------------------------------------------------------------------
# Other Nodes: Join Cluster
# -----------------------------------------------------------------------------
- name: Join k3s cluster on other nodes
  when:
    - not (k3s_is_first_node | bool)
    - k3s_needs_install | bool
  tags:
    - k3s
    - install
    - join
  block:
    - name: Install k3s and join cluster
      ansible.builtin.shell: |
        INSTALL_K3S_EXEC="server" \
        INSTALL_K3S_VERSION={{ k3s_version }} \
        {{ k3s_installer_script }}

    - name: Wait for k3s service
      ansible.builtin.systemd:
        name: "{{ k3s_service_name }}"
        state: started
        enabled: true
      register: k3s_service_join
      until: (k3s_service_join.status | default({})).ActiveState | default('') == "active"
      retries: "{{ k3s_wait_retries }}"
      delay: "{{ k3s_wait_delay }}"

# -----------------------------------------------------------------------------
# Verify Cluster Health
# -----------------------------------------------------------------------------
- name: Verify cluster health
  when: k3s_is_first_node | bool
  tags:
    - k3s
    - verify
  block:
    - name: Wait for all nodes to be ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        kubeconfig: "{{ k3s_kubeconfig_node }}"
      register: k8s_nodes
      until: (k8s_nodes.resources | default([])) | length == groups['k3s_servers'] | length
      retries: 20
      delay: 10

    - name: Check node ready status
      ansible.builtin.shell: |
        set -o pipefail
        {{ k3s_binary_path }} kubectl --kubeconfig {{ k3s_kubeconfig_node }} \
          get nodes -o json | jq -r '.items[].status.conditions[] | select(.type=="Ready") | .status'
      register: node_ready_status
      changed_when: false
      failed_when: "'False' in node_ready_status.stdout"

    - name: Display cluster nodes
      ansible.builtin.command: |
        {{ k3s_binary_path }} kubectl --kubeconfig {{ k3s_kubeconfig_node }} get nodes -o wide
      register: cluster_status
      changed_when: false

    - name: Show cluster status
      ansible.builtin.debug:
        var: cluster_status.stdout_lines

# -----------------------------------------------------------------------------
# Export Kubeconfig
# -----------------------------------------------------------------------------
- name: Export kubeconfig locally
  when:
    - k3s_is_first_node | bool
    - k3s_kubeconfig_local | bool
  tags:
    - k3s
    - kubeconfig
  block:
    - name: Ensure local .kube directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_local_path | dirname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false

    - name: Copy kubeconfig to local workstation
      ansible.builtin.fetch:
        src: "{{ k3s_kubeconfig_node }}"
        dest: "{{ kubeconfig_local_path }}"
        flat: true
      delegate_to: "{{ inventory_hostname }}"
      run_once: true
      become: true

    - name: Replace localhost IP with VIP address in kubeconfig
      ansible.builtin.replace:
        path: "{{ kubeconfig_local_path }}"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ k3s_vip_address }}:6443"
      delegate_to: localhost
      run_once: true
      become: false

    - name: Display kubeconfig saved message
      ansible.builtin.debug:
        msg: "Kubeconfig saved to {{ kubeconfig_local_path }}"

# -----------------------------------------------------------------------------
# Summary
# -----------------------------------------------------------------------------
- name: Display installation summary
  ansible.builtin.debug:
    msg: |
      k3s installation complete on {{ inventory_hostname }}:
        - Version: {{ k3s_version }}
        - Role: {{ 'first node (cluster-init)' if k3s_is_first_node else 'joining node' }}
        - Config: {{ k3s_config_file }}
        - Kubeconfig: {{ k3s_kubeconfig_node }}
  tags:
    - k3s
    - summary
