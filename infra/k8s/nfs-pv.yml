# =============================================================================
# Shared dataset volume - published Parquet datasets and publication metadata
# Used by: dataset publication jobs, dbt source readers, analysis pods
#
# Contract:
# - This RWX volume is for published reader-visible state only.
# - Store Parquet datasets, manifests, and contracts here.
# - Do not place a shared writable `.duckdb` file on this volume.
# - Any DuckDB work DB must use pod-local scratch such as emptyDir or node-local RWO.
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eve-datasets-pv
  labels:
    app.kubernetes.io/part-of: eve-market
    storage-purpose: datasets
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: "10.218.20.30"
    path: "/mnt/tank/eve-market/datasets"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eve-datasets-pvc
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: eve-market
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  volumeName: eve-datasets-pv
  resources:
    requests:
      storage: 100Gi
---
