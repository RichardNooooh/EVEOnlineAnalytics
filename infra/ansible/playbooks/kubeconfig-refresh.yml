#!/usr/bin/env ansible-playbook
# =============================================================================
# kubeconfig-refresh.yml — Refresh Local Kubeconfig
# =============================================================================
# Pulls current kubeconfig from first node, rewrites server URL, saves locally.
# Useful after TLS SAN changes or when kubeconfig needs regeneration.
#
# Usage:
#   ansible-playbook playbooks/kubeconfig-refresh.yml
# =============================================================================

---
- name: Refresh kubeconfig
  hosts: k3s_first_node
  become: true
  gather_facts: false

  tasks:
    - name: Fetch kubeconfig from first node
      ansible.builtin.slurp:
        src: "{{ k3s_kubeconfig_node }}"
      register: kubeconfig_b64

    - name: Ensure local .kube directory exists
      ansible.builtin.file:
        path: "{{ kubeconfig_local_path | dirname }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      become: false

    - name: Save kubeconfig locally with TLS-SAN rewrite
      ansible.builtin.copy:
        content: "{{ kubeconfig_b64.content | b64decode | regex_replace('https://127.0.0.1:6443', 'https://' ~ k3s_tls_san ~ ':6443') }}"
        dest: "{{ kubeconfig_local_path }}"
        mode: '0600'
        backup: true
      delegate_to: localhost
      run_once: true
      become: false

    - name: Display kubeconfig saved
      ansible.builtin.debug:
        msg: |
          Kubeconfig refreshed and saved to {{ kubeconfig_local_path }}
          Server URL: https://{{ k3s_tls_san }}:6443
      delegate_to: localhost
      run_once: true
      become: false
