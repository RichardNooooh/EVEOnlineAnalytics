# ---------------------------------------------------------------------------
# Admin credentials
# Use a pre-created Secret instead of committing credentials in Git.
# Create `grafana-admin-credentials` in the `monitoring` namespace with:
# - `admin-user`
# - `admin-password`
# ---------------------------------------------------------------------------
admin:
  existingSecret: grafana-admin-credentials
  userKey: admin-user
  passwordKey: admin-password


# ---------------------------------------------------------------------------
# Grafana Init
# Ensures correct callback URLs for OAuth/SAML-style auth flows, if used.
# ---------------------------------------------------------------------------
grafana.ini:
  server:
    root_url: https://eve-grafana.lab.answerisnoh.dev


# ---------------------------------------------------------------------------
# Resource limits
# RAM budget: ~0.5 GB. Grafana is lightweight for dashboarding.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Persistence: store dashboards and Grafana DB on local storage.
# Using k3s local-path-provisioner for fast access.
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

#---------------------------------------------------------------------------
# Datasources: VictoriaMetrics as Prometheus-compatible backend
# VictoriaMetrics exposes a Prometheus-compatible query API, so
# Grafana treats it as a Prometheus datasource.
# ---------------------------------------------------------------------------
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        access: proxy
        url: http://victoriametrics-victoria-metrics-single-server.monitoring.svc.cluster.local:8428
        isDefault: true
        editable: true

# ---------------------------------------------------------------------------
# Dashboard provisioning via sidecar
# Grafana's sidecar watches for ConfigMaps with the label
# "grafana_dashboard: '1'" and loads them as dashboards.
# Create ConfigMaps in the monitoring namespace with your dashboard JSON.
# ---------------------------------------------------------------------------
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
    resource: configmap

# ---------------------------------------------------------------------------
# Ingress: expose Grafana via k3s Traefik
# TLS is terminated at the homelab reverse proxy, so no TLS block is set here.
# DNS: create an A record for eve-grafana.lab.answerisnoh.dev → <k3s-node-IP>
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - "eve-grafana.lab.answerisnoh.dev"

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
