# =============================================================================
# Ansible Configuration — k3s Cluster Bootstrap
# =============================================================================
# Project-level configuration for Ansible. Optimized for homelab k3s cluster
# with 3 nodes. Enables pipelining, fact caching, and SSH multiplexing for
# faster playbook execution.
# =============================================================================

[defaults]
# Inventory and paths
inventory = inventory/hosts.ini
roles_path = roles
collections_path = collections

# SSH and connection optimization
host_key_checking = False
pipelining = True
forks = 10

# Output formatting
result_format = yaml
bin_ansible_callbacks = True

# Fact caching (speeds up repeated runs)
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 600

# Error handling
retry_files_enabled = False
deprecation_warnings = True

# Display settings
display_skipped_hosts = true
display_ok_hosts = true

[ssh_connection]
# SSH multiplexing for performance
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
control_path = %(directory)s/ansible-ssh-%%h-%%p-%%r
pipelining = True

# Prefer native scp for faster file transfers
scp_if_ssh = True

[privilege_escalation]
become = False
become_method = sudo
become_user = root
become_ask_pass = False

[colors]
# Color highlighting for different states
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecated = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
