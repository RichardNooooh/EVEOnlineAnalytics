# =============================================================================
# Preflight Role — Default Variables
# =============================================================================
# Read-only validation role. No changes are made to the system.
# =============================================================================

---
# Minimum Ansible version required
preflight_min_ansible_version: "2.15"

# Minimum Python version on target hosts
preflight_min_python_version: "3.10"

# Required groups in inventory
preflight_required_groups:
  - k3s_servers

# Total time to wait for a host to become reachable (seconds)
preflight_connectivity_timeout: 120

# Per-attempt SSH/connect timeout (seconds)
preflight_connectivity_connect_timeout: 5

# Seconds between connectivity retry attempts
preflight_connectivity_sleep: 5

# Initial delay before the first connectivity attempt (seconds)
preflight_connectivity_delay: 0

# Total attempts while waiting for cloud-init to finish first boot.
preflight_cloud_init_wait_retries: 30

# Seconds between cloud-init completion checks.
preflight_cloud_init_wait_delay: 10

# Required packages that must be present
preflight_required_packages:
  - python3
  - systemctl

# Disk space warning threshold (MB free)
preflight_min_disk_space_mb: 1024

# Memory warning threshold (MB free)
preflight_min_memory_mb: 512
