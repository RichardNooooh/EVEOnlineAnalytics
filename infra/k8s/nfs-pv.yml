# =============================================================================
# DuckDB data volume — warehouse database files
# Used by: dbt tasks, dlt ingestion tasks, analysis pods
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: eve-duckdb-pv
  labels:
    app.kubernetes.io/part-of: eve-market
    storage-purpose: warehouse
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: "10.218.20.30"
    path: "/mnt/tank/eve-market/duckdb"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: eve-duckdb-pvc
  namespace: airflow
  labels:
    app.kubernetes.io/part-of: eve-market
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 100Gi
---
# =============================================================================
# MLflow artifact volume — experiment artifacts only
# Used by: MLflow tracking server, training pods, BentoML (later)
# =============================================================================
