# =============================================================================
# Group Variables — k3s Servers
# =============================================================================
# Single source of truth for all site configuration. Everything a human
# would configure lives here. Role implementation internals live in each
# role's defaults/main.yml.
# =============================================================================

# -----------------------------------------------------------------------------
# k3s Configuration
# -----------------------------------------------------------------------------
# Target k3s version for installation
# Reference: https://github.com/k3s-io/k3s/releases
k3s_version: "v1.35.3+k3s1"

# k3s_vip VIP Address
k3s_vip_address: "10.218.20.200"

# k3s cluster domain for internal DNS
k3s_cluster_domain: "internal"

# -----------------------------------------------------------------------------
# kube_vip Configuration
# -----------------------------------------------------------------------------
kube_vip_version: "v1.1.2"
kube_vip_interface: "eth0"

# -----------------------------------------------------------------------------
# Kubeconfig Management
# -----------------------------------------------------------------------------
# Whether to copy kubeconfig to local workstation
k3s_kubeconfig_local: true

# Local path for kubeconfig (expanded at runtime)
kubeconfig_local_path: "~/.kube/config"

# Kubeconfig path on k3s nodes
k3s_kubeconfig_node: "/etc/rancher/k3s/k3s.yaml"

# Token file for cluster join (generated by OpenTofu in infra/terraform)
k3s_token_file: "{{ inventory_dir }}/k3s_cluster.key"

# -----------------------------------------------------------------------------
# k3s Paths
# -----------------------------------------------------------------------------
k3s_service_name: "k3s"
k3s_install_dir: "/usr/local/bin"
k3s_binary_path: "{{ k3s_install_dir }}/k3s"
k3s_uninstall_script: "{{ k3s_install_dir }}/k3s-uninstall.sh"
k3s_config_dir: "/etc/rancher/k3s"
k3s_config_file: "{{ k3s_config_dir }}/config.yaml"
k3s_data_dir: "/var/lib/rancher/k3s"
k3s_manifest_dir: "{{ k3s_data_dir }}/server/manifests"

# kube_vip config directory

# Cache directory for installer script
k3s_installer_cache: "/var/cache/k3s"

# etcd snapshots
k3s_etcd_snapshot_dir: "{{ k3s_data_dir }}/server/db/snapshots"
etcd_snapshot_local_dir: "{{ inventory_dir }}/etcd-snapshots"

# -----------------------------------------------------------------------------
# NFS Configuration
# -----------------------------------------------------------------------------
# TrueNAS NFS server IP address
# IMPORTANT: Must match the IP in infra/k8s/nfs-pv.yml
nfs_server: "10.218.20.30"

# Remote NFS export path on TrueNAS (dataset path configured in TrueNAS)
nfs_remote_path: "/mnt/tank/eve-market"

# Local mount point on k3s nodes
nfs_local_mount: "/mnt/truenas"

# NFS mount options (NFSv4.2 with performance tuning)
# - vers=4.2: Explicit NFS version (not relying on kernel default)
# - hard: Retry indefinitely on server failure (safer for data integrity)
# - intr: Allow interruption of hard mount operations
# - timeo=600: Deciseconds to wait before retry (60 seconds)
# - retrans=2: Number of retries before major timeout
# - rsize/wsize: Read/write block size (1MB for performance)
nfs_mount_options: "vers=4.2,hard,intr,timeo=600,retrans=2,rsize=1048576,wsize=1048576,_netdev"

# NFS health check subdirectory (test files go here, not root)
nfs_health_dir: ".ansible-health"

# -----------------------------------------------------------------------------
# Kubelet Resource Reservations
# -----------------------------------------------------------------------------
# Critical for stability on ~13GB nodes running Airflow (2-3GB) + dlt tasks
# Without these, system processes can be OOM-killed during memory spikes.

# # System-reserved resources (for OS daemons)
# k3s_system_reserved_cpu: "200m"
# k3s_system_reserved_memory: "512Mi"
# k3s_system_reserved_ephemeral: "1Gi"
#
# # Kube-reserved resources (for Kubernetes system pods)
# k3s_kube_reserved_cpu: "200m"
# k3s_kube_reserved_memory: "512Mi"
#
# # Eviction threshold — pods evicted when available memory drops below this
# k3s_eviction_hard_memory: "300Mi"
#
# # Feature gates (enable experimental features if needed)
# k3s_feature_gates: []

# -----------------------------------------------------------------------------
# etcd Configuration
# -----------------------------------------------------------------------------
# Snapshot schedule (cron format) — every 6 hours
etcd_snapshot_schedule_cron: "0 */6 * * *"

# Number of etcd snapshots to retain
etcd_snapshot_retention: 5

# -----------------------------------------------------------------------------
# Node Labels and Taints
# -----------------------------------------------------------------------------
# Labels applied to all server nodes
k3s_node_labels:
  - "node-type=server"
  - "homelab.eve-market/role=server"
